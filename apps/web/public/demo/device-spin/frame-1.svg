    <filter id="spinshadow1" x="482" y="220" width="476" height="416" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="20" flood-color="#000" flood-opacity=".42"/>
    </filter>
  </defs>
