<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="900" fill="#09110D"/>
  <circle cx="720" cy="396" r="286" fill="url(#ring1)" fill-opacity=".2"/>
  <rect x="112" y="112" width="1216" height="676" rx="42" fill="#101812" stroke="rgba(255,255,255,.12)"/>
  <ellipse cx="720" cy="688" rx="250" ry="46" fill="#000" fill-opacity=".26"/>
  <g filter="url(#spinshadow1)">
    <rect x="528" y="256" width="384" height="324" rx="148" fill="url(#speaker1)"/>
    <circle cx="720" cy="418" r="84" fill="#0F1510"/>
    <circle cx="720" cy="418" r="52" fill="#DDF9E8" fill-opacity=".84"/>
  </g>
  <text x="168" y="150" fill="#EFFAF4" font-size="72" font-family="Arial, sans-serif" font-weight="700">Controlled spin, premium pacing</text>
  <defs>
